name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  formula:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Homebrew/actions/setup-homebrew@master
      - name: Tap checkout
        run: brew tap local/nebius "${GITHUB_WORKSPACE}"
      - name: Sync formula into tap
        run: |
          tap_dir="$(brew --repository local/nebius)"
          mkdir -p "${tap_dir}/Formula"
          cp Formula/nebius.rb "${tap_dir}/Formula/nebius.rb"
      - name: Audit formula
        run: brew audit --formula local/nebius/nebius
      - name: Install formula
        run: brew install local/nebius/nebius
      - name: Test formula
        run: brew test local/nebius/nebius
